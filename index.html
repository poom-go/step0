<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N배송 세팅 사전 제출 요청</title>

<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

body {
  margin:0;
  font-family:'Pretendard';
  background:#f5f7fb;
}

.wrap {
  max-width:900px;
  margin:auto;
  padding:24px;
}

.card {
  background:white;
  border-radius:20px;
  padding:24px;
  margin-bottom:16px;
  box-shadow:0 8px 24px rgba(0,0,0,0.05);
}

h1 {margin:0 0 10px;}
h2 {margin:0 0 14px; font-size:18px;}

label {font-weight:600;}

input, select, textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

textarea {height:120px;}

.grid {display:grid; gap:12px; grid-template-columns:1fr 1fr;}
.full {grid-column:1/-1;}

button {
  background:black;
  color:white;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.edit-btn {
  font-size:12px;
  background:#eee;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.notice {
  background:#fff8e1;
  padding:16px;
  border-radius:12px;
  font-size:14px;
  line-height:1.6;
}

.done {
  text-align:center;
  padding:60px;
}

.modal {
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:white;
  padding:24px;
  border-radius:16px;
  width:90%;
  max-width:600px;
}
</style>
</head>

<body>
<div id="app"></div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2>입력 내용 확인</h2>
    <div id="summary"></div>
    <br>
    <button onclick="submitFinal()">최종 제출</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzMtCwGPCAhEj2ko3tgL7-e9frundQdDfhgngKx8-Uj494LGCi3GRYkMrLT-P6N7k-fiQ/exec";
const token = new URLSearchParams(location.search).get("token");

let currentData;

async function init(){
  const res = await fetch(API+"?token="+token);
  const data = await res.json();

  if(!data.ok) return alert(data.message);
  if(data.submitted) return renderDone();

  currentData = data.data;
  render(data.data);
}

function render(d){
document.getElementById("app").innerHTML = `
<div class="wrap">

<div class="card">
<img src="Primary Logo.png" style="height:40px"><br><br>
<h1>${d["고객사명"]} _ N배송 세팅 사전 제출 요청</h1>
</div>

<div class="card notice">
1. 세트 포장 작업은 지원되지 않습니다.<br>
2. 사은품도 SKU 등록 필요합니다.<br>
3. 입고 일정은 확정되지 않습니다.<br>
4. 직접 입고 예약 시 회송될 수 있습니다.
</div>

<div class="card">
<b>API 링크</b><br>${d["API 계정"]}<br><br>
<b>스토어명</b><br>${d["스토어링크"]}
</div>

<form id="form">

<div class="card">
<h2>1. 운영 정보</h2>
<input name="operatingSku" value="${d["운영 SKU"]||""}">
<select name="singleSkuYn">
<option>Y</option><option>N</option>
</select>
<input name="monthlyVolume" value="${d["월 물량"]||""}">
</div>

<div class="card">
<h2>2. 초도 입고</h2>
<input type="date" name="firstInboundDate">

<select id="method" name="method">
<option>차량</option>
<option>택배</option>
</select>

<input id="detail" placeholder="세부 정보 입력">
</div>

<div class="card">
<h2>기타</h2>
<input name="returnInboundAddress" placeholder="반품 입고지">
<input name="packingMethod" placeholder="포장 방법">
<input name="systemAccessEmail" placeholder="시스템 메일">
<input name="noticeEmail" placeholder="공지 메일">
<textarea name="extraInquiry"></textarea>
</div>

<div class="card">
<h2>약관 동의</h2>
<select name="contractAgree" required>
<option value="">선택</option>
<option value="동의">동의</option>
<option value="미동의">미동의</option>
</select>
</div>

<button type="submit">제출</button>

</form>
</div>
`;

document.getElementById("form").onsubmit = e=>{
e.preventDefault();
openSummary();
};
}

function openSummary(){
const f = new FormData(document.getElementById("form"));

if(!f.get("contractAgree")){
return alert("약관 동의 필요");
}

document.getElementById("summary").innerHTML = `
SKU: ${f.get("operatingSku")}<br>
물량: ${f.get("monthlyVolume")}<br>
약관: ${f.get("contractAgree")}
`;

document.getElementById("modal").style.display="flex";
}

async function submitFinal(){
const f = new FormData(document.getElementById("form"));

const payload = {
token,
form:{
operatingSku:f.get("operatingSku"),
singleSkuYn:f.get("singleSkuYn"),
monthlyVolume:f.get("monthlyVolume"),
firstInboundDate:f.get("firstInboundDate"),
firstInboundMethod:f.get("method")+" / "+document.getElementById("detail").value,
returnInboundAddress:f.get("returnInboundAddress"),
packingMethod:f.get("packingMethod"),
systemAccessEmail:f.get("systemAccessEmail"),
noticeEmail:f.get("noticeEmail"),
extraInquiry:f.get("extraInquiry"),
contractTermsAgree:f.get("contractAgree")
}
};

const res = await fetch(API,{
method:"POST",
body:JSON.stringify(payload)
});

const result = await res.json();

if(result.ok) renderDone();
else alert(result.message);
}

function renderDone(){
document.getElementById("app").innerHTML = `
<div class="done">
<img src="Primary Logo.png" style="height:40px"><br><br>
<h2>제출 완료</h2>
<p>확인 후 메일 드립니다🙏</p>
</div>
`;
}

init();
</script>
</body>
</html>
